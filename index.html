<!DOCTYPE html>
<html lang="en" class="light">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Universal AI - Automation Hub</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    
    <style>
        ::-webkit-scrollbar { width: 5px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 10px; }
        .dark ::-webkit-scrollbar-thumb { background: #475569; }
        
        #loader {
            position: fixed; inset: 0; background: #ffffff; z-index: 100;
            display: flex; flex-direction: column; align-items: center; justify-content: center;
        }
        .dark #loader { background: #0f172a; color: white; }

        body { min-height: 100dvh; display: flex; flex-direction: column; overflow: hidden; font-family: 'Inter', sans-serif; }
        #chat-scroll { flex: 1; overflow-y: auto; scroll-behavior: smooth; }
        
        #sidebar { transition: transform 0.3s cubic-bezier(0.4, 0, 0.2, 1); }
        @media (max-width: 768px) {
            #sidebar { transform: translateX(-100%); position: absolute; z-index: 40; height: 100%; }
            #sidebar.active { transform: translateX(0); }
        }

        .prose pre { background: #1e293b; color: #f8fafc; padding: 1rem; border-radius: 0.75rem; overflow-x: auto; }
        .message-user { background: #3b82f6; color: white; border-radius: 1.25rem 1.25rem 0 1.25rem; }
        .dark .message-user { background: #2563eb; }
        
        /* Automation Badge */
        .status-pulse { animation: pulse 2s infinite; }
        @keyframes pulse { 0% { opacity: 1; } 50% { opacity: 0.5; } 100% { opacity: 1; } }
    </style>
</head>
<body class="bg-white dark:bg-slate-900 text-slate-900 dark:text-slate-100">

    <div id="loader">
        <div class="flex flex-col items-center">
            <div class="w-10 h-10 border-4 border-blue-600 border-t-transparent rounded-full animate-spin mb-4"></div>
            <p class="text-sm font-bold tracking-widest uppercase opacity-50">Initializing Core...</p>
        </div>
    </div>

    <div class="flex h-screen w-full relative overflow-hidden">
        
        <aside id="sidebar" class="w-80 bg-slate-50 dark:bg-slate-900 border-r border-slate-200 dark:border-slate-800 flex flex-col shrink-0">
            <div class="p-4 border-b border-slate-200 dark:border-slate-800">
                <button onclick="createNewChat()" class="w-full flex items-center justify-center gap-2 py-3 bg-blue-600 text-white rounded-xl hover:bg-blue-700 transition-all font-bold shadow-lg shadow-blue-500/30">
                    <i data-lucide="zap" class="w-4 h-4 fill-current"></i> Initialize Session
                </button>
            </div>
            
            <div id="history-container" class="flex-1 overflow-y-auto p-3 space-y-2"></div>

            <div class="p-4 bg-slate-100 dark:bg-slate-800/50 m-3 rounded-xl border border-slate-200 dark:border-slate-700">
                <div class="flex items-center justify-between mb-2">
                    <span class="text-[10px] font-bold uppercase opacity-50">Automation Engine</span>
                    <span class="flex h-2 w-2 rounded-full bg-green-500 status-pulse"></span>
                </div>
                <div class="text-xs space-y-1">
                    <div class="flex justify-between"><span>YT Automation:</span> <span class="text-blue-500">Ready</span></div>
                    <div class="flex justify-between"><span>Source Feed:</span> <span class="text-blue-500">Active</span></div>
                </div>
            </div>

            <div class="p-4 border-t border-slate-200 dark:border-slate-800 space-y-1">
                <button onclick="toggleSettings()" class="w-full flex items-center gap-3 p-3 hover:bg-slate-200 dark:hover:bg-slate-800 rounded-xl transition-colors text-sm font-medium">
                    <i data-lucide="settings" class="w-5 h-5"></i> System Config
                </button>
                <button onclick="toggleTheme()" class="w-full flex items-center gap-3 p-3 hover:bg-slate-200 dark:hover:bg-slate-800 rounded-xl transition-colors text-sm font-medium">
                    <i data-lucide="moon" id="theme-icon" class="w-5 h-5"></i> <span id="theme-text">Dark Architecture</span>
                </button>
            </div>
        </aside>

        <main class="flex-1 flex flex-col min-w-0 bg-white dark:bg-slate-950">
            <nav class="h-16 border-b border-slate-200 dark:border-slate-800 flex items-center justify-between px-6 bg-white/50 dark:bg-slate-950/50 backdrop-blur-xl z-10">
                <div class="flex items-center gap-4">
                    <button onclick="toggleSidebar()" class="md:hidden p-2 hover:bg-slate-100 dark:hover:bg-slate-800 rounded-lg">
                        <i data-lucide="menu"></i>
                    </button>
                    <span id="header-title" class="font-bold tracking-tight">System Terminal</span>
                </div>
                <div class="flex gap-2">
                    <div id="active-model-tag" class="text-[10px] font-black px-2.5 py-1 bg-slate-100 dark:bg-slate-800 rounded-full">DEEPSEEK-R1</div>
                </div>
            </nav>

            <div id="chat-scroll" class="p-4 md:p-8">
                <div id="message-flow" class="max-w-4xl mx-auto space-y-10 pb-20"></div>
            </div>

            <div class="p-4 bg-gradient-to-t from-white dark:from-slate-950 pt-10">
                <div class="max-w-4xl mx-auto relative group">
                    <textarea id="prompt-input" rows="1" 
                        class="w-full p-5 pr-16 bg-slate-100 dark:bg-slate-900 border-none rounded-3xl focus:ring-2 focus:ring-blue-500 resize-none max-h-60 transition-all shadow-xl text-lg"
                        placeholder="Describe your automation workflow..." oninput="autoExpand(this)"></textarea>
                    <button id="send-btn" onclick="handleSend()" 
                        class="absolute right-4 bottom-4 p-3 bg-blue-600 text-white rounded-2xl hover:bg-blue-700 transition-all shadow-lg shadow-blue-500/40">
                        <i data-lucide="zap" class="w-6 h-6 fill-current"></i>
                    </button>
                </div>
                <div class="flex justify-center gap-4 mt-4 opacity-40">
                    <span class="text-[10px] font-bold uppercase tracking-widest flex items-center gap-1"><i data-lucide="video" class="w-3 h-3"></i> Auto-Generate</span>
                    <span class="text-[10px] font-bold uppercase tracking-widest flex items-center gap-1"><i data-lucide="youtube" class="w-3 h-3"></i> Auto-Upload</span>
                </div>
            </div>
        </main>
    </div>

    <div id="settings-modal" class="hidden fixed inset-0 z-50 bg-slate-950/80 backdrop-blur-md flex items-center justify-center p-4">
        <div class="bg-white dark:bg-slate-900 w-full max-w-lg rounded-[2.5rem] p-8 shadow-2xl border border-slate-200 dark:border-slate-800">
            <div class="flex justify-between items-center mb-8">
                <div>
                    <h2 class="text-2xl font-black italic tracking-tighter">CONFIGURATOR</h2>
                    <p class="text-xs text-slate-500 uppercase font-bold tracking-widest">Universal API & Automation</p>
                </div>
                <button onclick="toggleSettings()" class="p-2 hover:bg-slate-100 dark:hover:bg-slate-800 rounded-full transition-colors"><i data-lucide="x"></i></button>
            </div>
            
            <div class="space-y-6">
                <div class="grid grid-cols-2 gap-4">
                    <div>
                        <label class="text-[10px] font-black uppercase text-blue-500 mb-2 block">OpenRouter Key</label>
                        <input type="password" id="key-field" class="w-full p-4 rounded-2xl bg-slate-100 dark:bg-slate-950 border-none text-sm" placeholder="sk-or-...">
                    </div>
                    <div>
                        <label class="text-[10px] font-black uppercase text-blue-500 mb-2 block">Primary Model</label>
                        <input type="text" id="model-field" class="w-full p-4 rounded-2xl bg-slate-100 dark:bg-slate-950 border-none text-sm" value="deepseek/deepseek-r1:free">
                    </div>
                </div>
                
                <div>
                    <label class="text-[10px] font-black uppercase text-blue-500 mb-2 block">System Directive (Automation Logic)</label>
                    <textarea id="system-field" class="w-full p-4 rounded-2xl bg-slate-100 dark:bg-slate-950 border-none h-32 text-sm leading-relaxed" placeholder="Define how the AI should handle video creation and YouTube automation logic..."></textarea>
                </div>

                <div class="pt-4">
                    <button onclick="saveConfig()" class="w-full py-5 bg-blue-600 text-white rounded-[1.5rem] font-black uppercase tracking-widest shadow-xl shadow-blue-500/30 hover:bg-blue-700 active:scale-95 transition-all">
                        Synchronize System
                    </button>
                </div>
            </div>
        </div>
    </div>

    <script>
        // State
        let appState = {
            apiKey: localStorage.getItem('app_key') || '',
            model: localStorage.getItem('app_model') || 'deepseek/deepseek-r1:free',
            system: localStorage.getItem('app_sys') || 'You are an Automation Architect. You can generate video scripts, visual descriptions, and coordinate YouTube uploads. When asked to upload or create, provide a structured JSON response for the automation engine.',
            isDark: localStorage.getItem('app_theme') === 'dark',
            history: JSON.parse(localStorage.getItem('app_history') || '[]'),
            currentId: null,
            isThinking: false
        };

        // Lifecycle
        window.addEventListener('load', () => {
            if(appState.isDark) document.documentElement.classList.add('dark');
            document.getElementById('key-field').value = appState.apiKey;
            document.getElementById('model-field').value = appState.model;
            document.getElementById('system-field').value = appState.system;
            updateThemeUI();
            renderHistoryList();
            
            document.getElementById('prompt-input').addEventListener('keydown', (e) => {
                if (e.key === 'Enter' && !e.shiftKey) {
                    e.preventDefault();
                    handleSend();
                }
            });

            setTimeout(() => {
                document.getElementById('loader').classList.add('hidden');
                lucide.createIcons();
            }, 1000);
        });

        // Communication
        async function handleSend() {
            const input = document.getElementById('prompt-input');
            const prompt = input.value.trim();
            if (!prompt || appState.isThinking) return;
            if (!appState.apiKey) return toggleSettings();

            if (!appState.currentId) createNewChat(prompt.substring(0, 30));

            const chat = appState.history.find(c => c.id === appState.currentId);
            chat.messages.push({ role: 'user', content: prompt });
            
            input.value = '';
            input.style.height = 'auto';
            renderMessages();
            
            await callAI(prompt);
        }

        async function callAI(userPrompt) {
            appState.isThinking = true;
            updateSendBtn(true);

            const chat = appState.history.find(c => c.id === appState.currentId);
            const aiMsg = { role: 'assistant', content: '' };
            chat.messages.push(aiMsg);
            
            const msgIndex = chat.messages.length - 1;
            const flow = document.getElementById('message-flow');
            const aiDiv = createMessageElement('assistant', '');
            flow.appendChild(aiDiv);

            try {
                const response = await fetch("https://openrouter.ai/api/v1/chat/completions", {
                    method: "POST",
                    headers: {
                        "Authorization": `Bearer ${appState.apiKey}`,
                        "Content-Type": "application/json"
                    },
                    body: JSON.stringify({
                        model: appState.model,
                        messages: [
                            { role: "system", content: appState.system },
                            ...chat.messages.slice(0, -1)
                        ],
                        stream: true
                    })
                });

                const reader = response.body.getReader();
                const decoder = new TextDecoder();
                let fullText = "";

                while (true) {
                    const { done, value } = await reader.read();
                    if (done) break;

                    const chunk = decoder.decode(value);
                    const lines = chunk.split('\n');
                    
                    for (const line of lines) {
                        const cleanLine = line.replace(/^data: /, '').trim();
                        if (!cleanLine || cleanLine === '[DONE]') continue;
                        
                        try {
                            const parsed = JSON.parse(cleanLine);
                            const content = parsed.choices[0]?.delta?.content || "";
                            fullText += content;
                            
                            chat.messages[msgIndex].content = fullText;
                            aiDiv.querySelector('.prose-container').innerHTML = marked.parse(fullText);
                            document.getElementById('chat-scroll').scrollTop = document.getElementById('chat-scroll').scrollHeight;
                        } catch (e) {}
                    }
                }
                
                // --- INTEGRATION TRIGGER ---
                // If AI response contains specific automation keywords, trigger logic
                if (fullText.includes("AUTOMATION_TRIGGER")) {
                   simulateAutomation(fullText);
                }

            } catch (err) {
                aiDiv.querySelector('.prose-container').innerHTML = `<p class="text-red-500 font-bold">CORE ERROR: CONNECTION INTERRUPTED</p>`;
            } finally {
                appState.isThinking = false;
                updateSendBtn(false);
                save();
            }
        }

        // Logic for Automation Mockup
        function simulateAutomation(text) {
            console.log("Automation Sequence Initiated...");
            // This is where you would call a Webhook (e.g., Zapier or Make.com)
            // to handle the actual YouTube upload or Video rendering.
        }

        // UI Helpers
        function createMessageElement(role, text) {
            const div = document.createElement('div');
            div.className = `flex ${role === 'user' ? 'justify-end' : 'justify-start'} w-full animate-in fade-in slide-in-from-bottom-4 duration-500`;
            div.innerHTML = `
                <div class="max-w-[85%] px-6 py-5 ${role === 'user' ? 'message-user shadow-2xl shadow-blue-500/20' : 'w-full'}">
                    <div class="flex items-center gap-3 mb-3 opacity-30 text-[9px] font-black uppercase tracking-[0.2em]">
                        <i data-lucide="${role === 'user' ? 'terminal' : 'cpu'}" class="w-3 h-3"></i>
                        ${role === 'user' ? 'Commander' : 'Logic Engine'}
                    </div>
                    <div class="prose-container prose dark:prose-invert prose-slate max-w-none text-base leading-relaxed">
                        ${marked.parse(text || '...')}
                    </div>
                </div>
            `;
            setTimeout(() => lucide.createIcons(), 10);
            return div;
        }

        function renderMessages() {
            const flow = document.getElementById('message-flow');
            flow.innerHTML = '';
            const chat = appState.history.find(c => c.id === appState.currentId);
            if (!chat) return;
            chat.messages.forEach(m => flow.appendChild(createMessageElement(m.role, m.content)));
            document.getElementById('chat-scroll').scrollTop = document.getElementById('chat-scroll').scrollHeight;
        }

        function renderHistoryList() {
            const container = document.getElementById('history-container');
            container.innerHTML = '';
            [...appState.history].reverse().forEach(chat => {
                const btn = document.createElement('div');
                btn.className = `group flex items-center justify-between p-4 rounded-2xl cursor-pointer transition-all ${appState.currentId === chat.id ? 'bg-blue-600/10 text-blue-500 border border-blue-500/20' : 'hover:bg-slate-100 dark:hover:bg-slate-800'}`;
                btn.onclick = () => { appState.currentId = chat.id; renderMessages(); renderHistoryList(); if(window.innerWidth < 768) toggleSidebar(); };
                btn.innerHTML = `
                    <div class="flex items-center gap-3 overflow-hidden">
                        <i data-lucide="activity" class="w-4 h-4 shrink-0 opacity-40"></i>
                        <span class="truncate text-sm font-bold">${chat.title}</span>
                    </div>
                    <button onclick="event.stopPropagation(); deleteChat('${chat.id}')" class="opacity-0 group-hover:opacity-100 p-1 hover:text-red-500 transition-all"><i data-lucide="trash-2" class="w-4 h-4"></i></button>
                `;
                container.appendChild(btn);
            });
            lucide.createIcons();
        }

        function createNewChat(title = "New Workflow") {
            const id = Date.now().toString();
            appState.history.push({ id, title, messages: [] });
            appState.currentId = id;
            document.getElementById('header-title').innerText = title;
            save();
            renderHistoryList();
            renderMessages();
        }

        function deleteChat(id) {
            appState.history = appState.history.filter(c => c.id !== id);
            if (appState.currentId === id) appState.currentId = null;
            save();
            renderHistoryList();
            renderMessages();
        }

        function saveConfig() {
            appState.apiKey = document.getElementById('key-field').value;
            appState.model = document.getElementById('model-field').value;
            appState.system = document.getElementById('system-field').value;
            localStorage.setItem('app_key', appState.apiKey);
            localStorage.setItem('app_model', appState.model);
            localStorage.setItem('app_sys', appState.system);
            document.getElementById('active-model-tag').innerText = appState.model.split('/').pop().toUpperCase();
            toggleSettings();
        }

        function save() { localStorage.setItem('app_history', JSON.stringify(appState.history)); }
        function toggleSidebar() { document.getElementById('sidebar').classList.toggle('active'); }
        function toggleSettings() { document.getElementById('settings-modal').classList.toggle('hidden'); }
        function toggleTheme() {
            appState.isDark = !appState.isDark;
            document.documentElement.classList.toggle('dark');
            localStorage.setItem('app_theme', appState.isDark ? 'dark' : 'light');
            updateThemeUI();
        }
        function updateThemeUI() {
            const icon = document.getElementById('theme-icon');
            const text = document.getElementById('theme-text');
            icon.setAttribute('data-lucide', appState.isDark ? 'sun' : 'moon');
            text.innerText = appState.isDark ? 'Light Architecture' : 'Dark Architecture';
            lucide.createIcons();
        }
        function updateSendBtn(loading) {
            const btn = document.getElementById('send-btn');
            btn.disabled = loading;
            btn.innerHTML = loading ? `<div class="w-6 h-6 border-2 border-white/30 border-t-white rounded-full animate-spin"></div>` : `<i data-lucide="zap" class="w-6 h-6 fill-current"></i>`;
            lucide.createIcons();
        }
        function autoExpand(el) { el.style.height = 'auto'; el.style.height = el.scrollHeight + 'px'; }
    </script>
</body>
</html>
