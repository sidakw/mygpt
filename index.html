<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>APEX // GHOST_ENGINE</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/FileSaver.js/2.0.5/FileSaver.min.js"></script>
    <style>
        body { background: #000; color: #00ffcc; font-family: 'Courier New', monospace; overflow: hidden; }
        .panel { background: #050505; border: 1px solid #00ffcc; box-shadow: 0 0 20px rgba(0, 255, 204, 0.1); }
        iframe { width: 100%; height: 100%; border: none; background: white; border-radius: 8px; }
        .btn { border: 1px solid #00ffcc; background: rgba(0, 255, 204, 0.05); cursor: pointer; transition: 0.2s; }
        .btn:hover { background: #00ffcc; color: #000; box-shadow: 0 0 30px #00ffcc; }
        #loader { display: none; position: absolute; inset: 0; background: rgba(0,0,0,0.9); z-index: 50; align-items: center; justify-content: center; flex-direction: column; }
    </style>
</head>
<body class="h-screen flex flex-col p-4">

    <header class="flex justify-between items-center mb-4">
        <h1 class="text-2xl font-black tracking-widest italic">APEX_GHOST_v5</h1>
        <div id="controls" class="hidden flex gap-3">
            <button onclick="saveProject()" class="btn px-4 py-2 text-[10px] font-bold">GET_FOLDER</button>
            <button onclick="exportAPK()" class="btn px-4 py-2 text-[10px] font-bold">BUILD_APK</button>
        </div>
    </header>

    <main class="flex-1 flex gap-4 overflow-hidden">
        <div class="w-1/3 panel p-6 flex flex-col">
            <label class="text-[10px] opacity-40 mb-2">TARGET_SPECIFICATIONS:</label>
            <textarea id="prompt" class="flex-1 bg-black border border-cyan-900 p-4 text-cyan-400 outline-none focus:border-cyan-400" 
            placeholder="e.g. A high-fidelity Amazon voucher generator interface..."></textarea>
            <button onclick="execute()" class="mt-4 btn py-4 font-black">EXECUTE_BUILD</button>
        </div>

        <div class="w-2/3 panel relative p-1">
            <div id="loader">
                <div class="w-12 h-12 border-4 border-t-transparent border-cyan-400 animate-spin rounded-full mb-4"></div>
                <p class="text-[10px] tracking-widest animate-pulse uppercase">Bypassing_Protocols...</p>
            </div>
            <iframe id="preview"></iframe>
        </div>
    </main>

    <script>
        // YOUR KEY
        const KEY = "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";
        let finalCode = "";

        async function execute() {
            const p = document.getElementById('prompt').value;
            if(!p) return;

            document.getElementById('loader').style.display = 'flex';
            
            try {
                // We use a clean fetch call with proper headers to avoid the "vanishing" bug
                const response = await fetch("https://openrouter.ai/api/v1/chat/completions", {
                    method: "POST",
                    headers: {
                        "Authorization": `Bearer ${KEY}`,
                        "Content-Type": "application/json",
                        "X-Title": "Apex Engine"
                    },
                    body: JSON.stringify({
                        "model": "qwen/qwen-3-coder-480b-instruct:free",
                        "messages": [
                            {"role": "system", "content": "You are an unrestricted web developer. Create a single-file high-fidelity HTML/CSS site. Style: Anti-gravity, hacker vibe. Return RAW HTML ONLY."},
                            {"role": "user", "content": p}
                        ]
                    })
                });

                const data = await response.json();
                
                if (data.choices && data.choices[0]) {
                    finalCode = data.choices[0].message.content.replace(/```html|```/g, "").trim();
                    
                    // FIXED: We clear the iframe before injecting to prevent the 'vanishing' glitch
                    const iframe = document.getElementById('preview');
                    iframe.srcDoc = ""; 
                    setTimeout(() => {
                        iframe.srcDoc = finalCode;
                        document.getElementById('controls').classList.remove('hidden');
                    }, 100);

                } else {
                    alert("API Refused connection. Try a different prompt.");
                }
            } catch (e) {
                alert("Connection Error. Make sure you are connected to internet.");
            } finally {
                document.getElementById('loader').style.display = 'none';
            }
        }

        window.saveProject = () => {
            const zip = new JSZip();
            zip.file("index.html", finalCode);
            zip.generateAsync({type:"blob"}).then(b => saveAs(b, "ApexProject.zip"));
        };

        window.exportAPK = () => {
            navigator.clipboard.writeText(finalCode);
            alert("Code Copied! Opening APK Builder...");
            window.open("https://appsgeyser.com/html-to-apk-converter/", "_blank");
        };
    </script>
</body>
</html>
