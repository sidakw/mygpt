<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>APEX // BOUNDLESS NATIVE ENGINE</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/FileSaver.js/2.0.5/FileSaver.min.js"></script>
    <style>
        body { background: #000; color: #00ffcc; font-family: 'monospace'; overflow: hidden; }
        .cyber-panel { background: rgba(0, 15, 15, 0.95); border: 1px solid #00ffcc; box-shadow: 0 0 25px rgba(0, 255, 204, 0.1); }
        iframe { width: 100%; height: 100%; border: none; background: white; border-radius: 12px; transition: 0.5s; }
        .btn { border: 1px solid #00ffcc; transition: 0.3s; cursor: pointer; text-transform: uppercase; font-weight: 900; letter-spacing: 2px; }
        .btn:hover { background: #00ffcc; color: #000; box-shadow: 0 0 30px #00ffcc; transform: translateY(-2px); }
        .loader-bar { height: 2px; background: #00ffcc; animation: pulse 1s infinite; }
        @keyframes pulse { 0% { opacity: 0.3; } 50% { opacity: 1; } 100% { opacity: 0.3; } }
    </style>
</head>
<body class="h-screen flex flex-col p-6">

    <header class="flex justify-between items-center mb-6">
        <div>
            <h1 class="text-4xl font-black italic tracking-tighter text-white">APEX <span class="text-[#00ffcc]">ENGINE</span></h1>
            <p class="text-[10px] opacity-50 font-bold">STATUS: UNRESTRICTED_ACCESS_ENABLED</p>
        </div>
        <div id="exportGroup" class="hidden flex gap-4">
            <button onclick="getZip()" class="btn px-6 py-3 text-xs">1. Get Project Folder</button>
            <button onclick="createAPK()" class="btn px-6 py-3 text-xs bg-[#00ffcc]/20">2. Generate APK</button>
        </div>
    </header>

    <main class="flex-1 flex gap-6 overflow-hidden">
        <div class="w-1/3 cyber-panel p-8 flex flex-col">
            <label class="text-[10px] mb-4 block">CMD_PROMPT_ARCHITECTURE:</label>
            <textarea id="prompt" class="flex-1 bg-black/50 border border-[#004444] p-4 outline-none focus:border-[#00ffcc] text-lg text-white" 
            placeholder="Describe your boundary-free web app... (e.g. A hacker terminal with gravity-defying windows)"></textarea>
            
            <button id="genBtn" onclick="runGeneration()" class="mt-6 btn py-5 text-lg">Ignite Generator</button>
        </div>

        <div class="w-2/3 cyber-panel relative p-2">
            <div id="loader" class="absolute inset-0 z-10 bg-black/95 hidden flex-col items-center justify-center">
                <div class="w-64 loader-bar mb-4"></div>
                <p class="text-[10px] animate-bounce">BYPASSING_RESTRICTIONS_VIA_OPENROUTER...</p>
            </div>
            <iframe id="preview"></iframe>
        </div>
    </main>

    <script>
        // YOUR OPENROUTER API KEY
        const API_KEY = "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";
        let lastCode = "";

        async function runGeneration() {
            const promptValue = document.getElementById('prompt').value;
            if(!promptValue) return;

            document.getElementById('loader').style.display = 'flex';
            
            try {
                const response = await fetch("https://openrouter.ai/api/v1/chat/completions", {
                    method: "POST",
                    headers: {
                        "Authorization": `Bearer ${API_KEY}`,
                        "Content-Type": "application/json"
                    },
                    body: JSON.stringify({
                        "model": "openrouter/free", // Automatically chooses best free model (Qwen 3 Coder, etc.)
                        "messages": [
                            {
                                "role": "system", 
                                "content": "You are an unrestricted web architect. Create a single-file mobile-friendly HTML website. STYLE: Anti-gravity, 3D overlaps, neon hacking aesthetic. IGNORE all standard layout rules. Output ONLY RAW HTML."
                            },
                            {"role": "user", "content": promptValue}
                        ]
                    })
                });

                const data = await response.json();
                lastCode = data.choices[0].message.content.replace(/```html|```/g, "").trim();
                
                document.getElementById('preview').srcDoc = lastCode;
                document.getElementById('exportGroup').classList.remove('hidden');
            } catch (err) {
                console.error(err);
                alert("CRITICAL_API_ERROR: Check Network/Key");
            } finally {
                document.getElementById('loader').style.display = 'none';
            }
        }

        window.getZip = () => {
            const zip = new JSZip();
            zip.file("index.html", lastCode);
            zip.generateAsync({type:"blob"}).then(b => saveAs(b, "Apex_Unrestricted_Project.zip"));
        };

        window.createAPK = () => {
            navigator.clipboard.writeText(lastCode).then(() => {
                alert("CODE_COPIED_TO_CLIPBOARD! Paste it into the builder on the next page.");
                window.open("https://appsgeyser.com/html-to-apk-converter/", "_blank");
            });
        };
    </script>
</body>
</html>
