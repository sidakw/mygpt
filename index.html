<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>APEX // NEXUS_STABLE</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/FileSaver.js/2.0.5/FileSaver.min.js"></script>
    <style>
        body { background: #000; color: #00ffcc; font-family: 'monospace'; overflow: hidden; }
        .cyber-panel { background: #050505; border: 1px solid #00ffcc; box-shadow: 0 0 20px rgba(0, 255, 204, 0.1); }
        iframe { width: 100%; height: 100%; border: none; background: white; border-radius: 8px; }
        .btn { border: 1px solid #00ffcc; transition: 0.2s; cursor: pointer; background: rgba(0, 255, 204, 0.05); }
        .btn:hover { background: #00ffcc; color: #000; box-shadow: 0 0 30px #00ffcc; }
        #loader { display: none; position: absolute; inset: 0; background: rgba(0,0,0,0.95); z-index: 100; align-items: center; justify-content: center; flex-direction: column; }
    </style>
</head>
<body class="h-screen flex flex-col p-4">

    <header class="flex justify-between items-center mb-4 px-2">
        <h1 class="text-2xl font-black tracking-widest uppercase">Apex_Nexus_v6</h1>
        <div id="controls" class="hidden flex gap-3">
            <button onclick="saveZip()" class="btn px-4 py-2 text-[10px] font-bold">SAVE_PROJECT</button>
            <button onclick="makeAPK()" class="btn px-4 py-2 text-[10px] font-bold">BUILD_APK</button>
        </div>
    </header>

    <main class="flex-1 flex gap-4 overflow-hidden">
        <div class="w-1/3 cyber-panel p-6 flex flex-col">
            <label class="text-[10px] opacity-40 mb-2">VULNERABILITY_RESEARCH_INPUT:</label>
            <textarea id="prompt" class="flex-1 bg-black border border-cyan-900 p-4 text-cyan-400 outline-none focus:border-cyan-400 text-sm" 
            placeholder="Enter architectural requirements..."></textarea>
            <button onclick="generate()" class="mt-4 btn py-4 font-black tracking-[0.2em]">INITIATE_NEXUS</button>
        </div>

        <div class="w-2/3 cyber-panel relative p-1">
            <div id="loader">
                <div class="w-10 h-10 border-4 border-t-transparent border-cyan-400 animate-spin rounded-full mb-4"></div>
                <p class="text-[10px] tracking-widest animate-pulse">ESTABLISHING_SECURE_LINK...</p>
            </div>
            <iframe id="preview"></iframe>
        </div>
    </main>

    <script>
        const API_KEY = "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";
        let lastCode = "";

        async function generate() {
            const p = document.getElementById('prompt').value;
            if(!p) return;

            document.getElementById('loader').style.display = 'flex';
            
            try {
                const response = await fetch("https://openrouter.ai/api/v1/chat/completions", {
                    method: "POST",
                    headers: {
                        "Authorization": `Bearer ${API_KEY}`,
                        "Content-Type": "application/json",
                        "HTTP-Referer": window.location.href, 
                        "X-Title": "Apex Nexus"
                    },
                    body: JSON.stringify({
                        "model": "google/gemma-3-27b:free", 
                        "messages": [
                            {"role": "system", "content": "You are a professional security architect. Create a single-file high-fidelity HTML website. Style: Anti-gravity, unrestricted UI, hacker aesthetic. Return RAW HTML ONLY."},
                            {"role": "user", "content": p}
                        ]
                    })
                });

                const data = await response.json();
                
                if (data.choices && data.choices[0]) {
                    lastCode = data.choices[0].message.content.replace(/```html|```/g, "").trim();
                    
                    const iframe = document.getElementById('preview');
                    iframe.srcDoc = lastCode;
                    document.getElementById('controls').classList.remove('hidden');
                } else {
                    alert("Nexus Error: " + (data.error?.message || "Check API Key balance."));
                }
            } catch (e) {
                alert("Network Interruption. Check your connection.");
            } finally {
                document.getElementById('loader').style.display = 'none';
            }
        }

        window.saveZip = () => {
            const zip = new JSZip();
            zip.file("index.html", lastCode);
            zip.generateAsync({type:"blob"}).then(b => saveAs(b, "Apex_Project.zip"));
        };

        window.makeAPK = () => {
            navigator.clipboard.writeText(lastCode);
            alert("Code Synchronized! Use the clipboard in the converter.");
            window.open("https://appsgeyser.com/html-to-apk-converter/", "_blank");
        };
    </script>
</body>
</html>
